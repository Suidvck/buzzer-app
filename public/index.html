<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzer App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Role Selection -->
    <div id="role-select">
        <h1>BUZZER</h1>
        <p>เลือกบทบาทของคุณ</p>
        <button id="btn-host-role" onclick="selectRole('host')">HOST</button>
        <button id="btn-player-role" onclick="selectRole('player')">PLAYER</button>
    </div>

    <!-- Player Name Input -->
    <div id="name-input" class="hidden">
        <h2>กรอกชื่อของคุณ</h2>
        <input type="text" id="player-name" placeholder="ชื่อ..." maxlength="20" autofocus>
        <button onclick="submitName()">เข้าร่วม</button>
    </div>

    <!-- Host Password Input -->
    <div id="host-password-input" class="hidden">
        <h2>ใส่รหัสหัวห้อง</h2>
        <input type="password" id="host-password" placeholder="รหัส..." autofocus>
        <button onclick="submitHostPassword()">ยืนยัน</button>
        <p id="host-password-error" class="hidden" style="color:#ff4444;margin-top:0.5rem">รหัสผิด!</p>
    </div>

    <!-- Host Panel -->
    <div id="host-panel" class="hidden">
        <h2>HOST CONTROL</h2>
        <div class="host-controls">
            <button id="btn-unlock" class="control-btn unlock" onclick="hostAction('unlock')">เปิดให้กด (UNLOCK)</button>
            <button id="btn-lock" class="control-btn lock" onclick="hostAction('lock')">ล็อค (LOCK)</button>
            <button id="btn-reset" class="control-btn reset" onclick="hostAction('reset')">RESET</button>
        </div>
        <div class="status-bar">
            สถานะ: <span id="host-status" class="status-lock">LOCKED</span>
            | ผู้เล่น: <span id="player-count">0</span> คน
        </div>
        <h3>LEADERBOARD</h3>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>#</th>
                    <th>ชื่อ</th>
                    <th>เวลา (ms)</th>
                    <th>CPS</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>
        <div id="no-results" class="no-results">ยังไม่มีผลลัพธ์</div>
    </div>

    <!-- Player Panel -->
    <div id="player-panel" class="hidden">
        <h2 id="welcome-msg">ยินดีต้อนรับ</h2>
        <div id="buzzer-area">
            <button id="buzzer-btn" class="buzzer-btn locked" disabled>
                LOCKED
            </button>
            <div id="buzz-result" class="buzz-result hidden"></div>
        </div>
        <div class="player-info">
            <span id="player-status-text">รอ host เปิดปุ่ม...</span>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
